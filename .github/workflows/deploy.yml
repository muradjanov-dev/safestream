name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name safestream-staging --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy to staging
        run: |
          helm upgrade --install safestream ./infrastructure/helm/charts/safestream \
            --namespace safestream-staging \
            --create-namespace \
            --set global.image.tag=${{ github.sha }} \
            --values infrastructure/helm/values.staging.yaml \
            --atomic \
            --timeout 10m \
            --wait

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          curl -f https://api.staging.safestream.app/api/v1/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name safestream-prod --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy to production (blue/green)
        run: |
          helm upgrade --install safestream ./infrastructure/helm/charts/safestream \
            --namespace safestream-prod \
            --create-namespace \
            --set global.image.tag=${{ github.sha }} \
            --values infrastructure/helm/values.prod.yaml \
            --atomic \
            --timeout 15m \
            --wait

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service -n safestream-prod
          kubectl rollout status deployment/video-service -n safestream-prod

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text":"SafeStream production deploy ${{ job.status == 'success' && '✅ succeeded' || '❌ failed' }} — commit ${{ github.sha }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
